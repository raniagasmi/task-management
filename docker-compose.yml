services:
  mongo:
    image: mongo:7
    container_name: task-manager-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: task-manager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-task_manager}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-task_manager}"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: task-manager-user-service
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongo:27017/task_manager_users
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_long_random_secret}
      JWT_EXPIRES_IN: 24h
      BCRYPT_SALT_ROUNDS: 10
      HTTP_PORT: 3001
    ports:
      - "3001:3001"

  task-service:
    build:
      context: ./task-service
      dockerfile: Dockerfile
    container_name: task-manager-task-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-task_manager}
      NODE_ENV: development
    ports:
      - "3002:3002"

  recruitment-service:
    build:
      context: ./recruitment-service
      dockerfile: Dockerfile
    container_name: task-manager-recruitment-service
    restart: unless-stopped
    env_file:
      - ./recruitment-service/.env
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongo:27017/recruitment_service
    ports:
      - "3004:3004"

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: task-manager-api-gateway
    restart: unless-stopped
    depends_on:
      user-service:
        condition: service_started
      task-service:
        condition: service_started
      recruitment-service:
        condition: service_started
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_long_random_secret}
      USER_SERVICE_HOST: user-service
      USER_SERVICE_PORT: 3001
      TASK_SERVICE_HOST: task-service
      TASK_SERVICE_PORT: 3002
      RECRUITMENT_SERVICE_HOST: recruitment-service
      RECRUITMENT_SERVICE_PORT: 3004
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task-manager-frontend
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "5173:5173"
    command: npm run preview -- --host 0.0.0.0 --port 5173

volumes:
  mongo_data:
  postgres_data:
